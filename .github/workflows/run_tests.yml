name: Automated tests by CI

on:
  push

jobs:
  UI-Tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checking repository
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install Chrome
        run: sudo apt-get update && sudo apt-get install -y google-chrome-stable
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ui_testCases -v -n auto
        
  API-Tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checking repository
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Checkout API service
        uses: actions/checkout@v3
        with:
          repository: sun6r0/test-service
          path: api-service

      - name: Patch API compose migration command
        run: |
          cd api-service
          # Upstream compose requests 3 migrations, but repo currently has only 2.
          sed -i 's/"up", "3"/"up"/g' docker-compose.yaml
          echo "=== Patched migrate command ==="
          grep -n "command:" docker-compose.yaml
      
      - name: Create .env file for API service
        run: |
          cd api-service
          cat > .env << 'EOF'
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_DB=postgres
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432
          HTTP_PORT=8080
          LOGGER_FORMAT=text
          EOF
          echo "=== .env file created ==="
          cat .env
      
      - name: Start API service
        run: |
          cd api-service
          docker compose down -v 2>/dev/null || true
          docker compose up --build -d
          echo "Waiting for services to start..."
          sleep 15
          echo "=== Docker containers ==="
          docker ps -a

      - name: Wait for migrations to complete
        run: |
          cd api-service
          MIGRATE_CONTAINER_ID=$(docker compose ps -q --all migrate | head -n 1)
          if [ -z "$MIGRATE_CONTAINER_ID" ]; then
            echo "Migrate container not found"
            docker compose logs migrate
            exit 1
          fi

          MIGRATE_EXIT_CODE=$(docker wait "$MIGRATE_CONTAINER_ID")
          echo "Migration exit code: $MIGRATE_EXIT_CODE"
          docker logs "$MIGRATE_CONTAINER_ID" || true

          if [ "$MIGRATE_EXIT_CODE" != "0" ]; then
            echo "Migration failed"
            exit 1
          fi
          echo "Migration completed"
      
      - name: Check migration status
        run: |
          cd api-service
          echo "=== Checking migration logs ==="
          docker compose logs migrate
          echo ""
          echo "=== Checking PostgreSQL ==="
          docker compose exec postgres pg_isready -U postgres
          echo ""
          echo "=== Checking database tables ==="
          docker compose exec postgres psql -U postgres -d postgres -c "\dt"

      - name: Verify API service container state
        run: |
          cd api-service
          SERVICE_CONTAINER_ID=$(docker compose ps -q --all service | head -n 1)
          if [ -z "$SERVICE_CONTAINER_ID" ]; then
            echo "Service container not found"
            docker compose ps --all
            exit 1
          fi

          echo "=== docker compose ps ==="
          docker compose ps --all

          echo "=== Service inspect (state + exit) ==="
          docker inspect "$SERVICE_CONTAINER_ID" \
            --format 'Status={{.State.Status}} ExitCode={{.State.ExitCode}} Error={{.State.Error}} OOMKilled={{.State.OOMKilled}} StartedAt={{.State.StartedAt}} FinishedAt={{.State.FinishedAt}}'

          SERVICE_STATE=$(docker inspect -f '{{.State.Status}}' "$SERVICE_CONTAINER_ID")
          echo "Service state: $SERVICE_STATE"

          if [ "$SERVICE_STATE" != "running" ]; then
            echo "Service is not running. Last 300 lines of logs:"
            docker logs --tail 300 "$SERVICE_CONTAINER_ID" || true

            echo "=== Full compose logs (service + postgres + migrate) ==="
            docker compose logs --no-color --tail=300 service postgres migrate || true

            exit 1
          fi
      
      - name: Wait for API to be ready
        run: |
          for i in {1..40}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/time 2>/dev/null || echo "000")
            echo "Attempt $i/40: HTTP $HTTP_CODE"
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "API is ready"
              exit 0
            fi

            sleep 2
          done
          
          echo "API did not become ready"
          cd api-service
          echo "=== Full service logs ==="
          docker compose logs service
          exit 1
      
      - name: Debug API endpoints
        run: |
          echo "=== Testing API endpoints ==="
          echo "GET /api/getAll:"
          curl -s http://localhost:8080/api/getAll | head -c 500
          echo ""
          echo ""
          echo "POST /api/create (test):"
          curl -s -X POST http://localhost:8080/api/create \
            -H "Content-Type: application/json" \
            -d '{"title":"test","verified":true,"important_numbers":[1,2,3],"addition":{"additional_info":"test","additional_number":123}}' | head -c 500
          echo ""
      
      - name: Run API tests
        run: |
          # Запускаем без параллельного выполнения для диагностики
          pytest tests/api_testCases -v --maxfail=3 -x
      
      - name: Stop API service
        if: always()
        run: |
          cd api-service
          docker compose down -v