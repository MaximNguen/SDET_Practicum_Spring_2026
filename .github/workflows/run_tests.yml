name: Automated tests by CI

on:
  push

jobs:
  UI-Tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checking repository
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install Chrome
        run: sudo apt-get update && sudo apt-get install -y google-chrome-stable
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ui_testCases -v -n auto
        
  API-Tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checking repository
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt     
      - name: Checking repository API-service
        uses: actions/checkout@v3
        with:
          repository: sun6r0/test-service
          path: api-service
      - name: Install docker-compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose 
      - name: Start API service
        run: |
          cd api-service
          docker-compose up --build -d
          docker ps
          docker compose logs
          sleep 10
      - name: Wait for API to be ready
        run: |
          # Try for ~60 seconds (30 * 2s)
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/api/getAll > /dev/null; then
              echo "API is up"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done

          echo "API did not become ready in time"
          cd api-service
          docker-compose logs --no-color
          exit 1
      - name: Run tests
        run: 
          pytest tests/api_testCases -v -n auto
