name: Automated tests by CI

on:
  push

jobs:
  UI-Tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checking repository
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install Chrome
        run: sudo apt-get update && sudo apt-get install -y google-chrome-stable
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ui_testCases -v -n auto
        
  API-Tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checking repository
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Checkout API service
        uses: actions/checkout@v3
        with:
          repository: sun6r0/test-service
          path: api-service
      - name: Install docker-compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose
      - name: Start API service
        run: |
          cd api-service
          docker-compose up --build -d postgres
          sleep 10
      - name: Create database schema manually
        run: |
          cd api-service
          docker-compose exec -T postgres psql -U postgres << 'EOF'
          DROP TABLE IF EXISTS additions CASCADE;
          DROP TABLE IF EXISTS entities CASCADE;
          
          CREATE TABLE entities (
              id SERIAL PRIMARY KEY,
              title TEXT NOT NULL,
              verified BOOLEAN DEFAULT FALSE,
              important_numbers JSONB,
              addition JSONB
          );
          
          CREATE TABLE additions (
              id SERIAL PRIMARY KEY,
              entity_id INTEGER REFERENCES entities(id) ON DELETE CASCADE,
              additional_info TEXT,
              additional_number INTEGER
          );
          
          GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO postgres;
          GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO postgres;
          EOF
          docker-compose up -d service
          sleep 10
      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/api/getAll > /dev/null 2>&1; then
              echo "API is up"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
          echo "API did not become ready in time"
          cd api-service
          docker-compose logs --no-color
          exit 1
      - name: Run API tests
        run: |
          pytest tests/api_testCases -v -n auto --maxfail=5
      - name: Stop API service
        if: always()
        run: |
          cd api-service
          docker-compose down -v